languageCode = "zh-CN"
title = "ByronWan 的个人博客"
theme = "terminal"

paginate = 5
defaultContentLanguage = "zh"

[params]
  contentTypeName = "post"
  themeColor = "orange"
  showMenuItems = 10
  showLanguageSelector = false
  fullWidthTheme = true
  centerTheme = true
  autoCover = true
  showLastUpdated = true
  readingTime = true 
  enableGitInfo = true
  Toc = true 
  TocTitle = "文章目录" 

  githubLink = "https://github.com/byronwanbl/byronwanbl.github.io"
[params.logo]
  logoHomeLink = "/"

[languages]
  [languages.zh]
    languageName = "简体中文"
    title = "ByronWan 的个人博客"
    owner = "ByronWan (byronwan@outlook.com)"
    copyright = "Copyright (c) 2022-present ByronWan (byronwan@outlook.com)"
    newerPosts = "上一页"
    olderPosts = "下一页"
    [languages.zh.params.logo]
      logoText = "Byronwan 的个人博客"